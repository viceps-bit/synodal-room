<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        color: #e08e0b;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
        opacity: 0.9;
      }
      .code {
        font-size: 4rem;
        font-weight: 700;
        color: #f39c12;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #000000;
      }
      .message {
        font-size: 1rem;
        color: rgba(0, 0, 0, 0.7);
        max-width: 400px;
        line-height: 1.5;
        margin-bottom: 2rem;
      }
      .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #f39c12;
        color: #1a1a2e;
        text-decoration: none;
        border-radius: 4px;
        font-weight: 500;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #e08e0b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
        />
        <line x1="9" y1="9" x2="15" y2="9" />
      </svg>
      <div class="code">404</div>
      <h1 class="title">Map Not Found</h1>
      <p class="message">
        The page you're looking for doesn't exist on this map. It may have been
        moved or removed.
      </p>
      <a href="/" class="btn">Return to Map</a>
    </div>
  </body>
</html>
