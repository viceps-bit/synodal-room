user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    upstream tiles_upstream {
        server martin-tileserver:3000;
    }

    upstream titiler_backend {
        server titiler:8000;
    }

    server {
        listen       80;
        listen  [::]:80;
        # server_name  localhost;
        root /usr/share/nginx/html;

        location /tms/ {
                proxy_pass https://lcz-generator.rub.de/tms/;
                proxy_set_header Host lcz-generator.rub.de;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_ssl_server_name on;  # Enable SNI for HTTPS
            }

        location ^~ /cog/tiles {
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_pass http://titiler_backend$request_uri;
        }

        location ~ /tiles/(?<fwd_path>.*) {
                proxy_set_header  X-Rewrite-URL $uri;
                proxy_set_header  X-Forwarded-Host $host:$server_port;
                proxy_set_header  X-Forwarded-Proto $scheme;
                proxy_redirect    off;

                proxy_pass http://tiles_upstream/$fwd_path$is_args$args;
            }


        location / {
                index index.html;
                try_files $uri /index.html =404;
        }


    }

}